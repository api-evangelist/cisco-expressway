modified: '2026-05-05'
reconciled: false
tags:
  - Collaboration
  - Unified Communications
  - Video Conferencing
  - SIP
  - Session Border Controller
description: Cisco Expressway is on-premises (or cloud-deployed) software for secure firewall traversal,
  B2B video, and Mobile and Remote Access (MRA) for Cisco Unified Communications Manager. It is licensed
  through Cisco Smart Licensing as part of Cisco's collaboration portfolio (Cisco Collaboration Flex
  Plan, Webex Suite, or perpetual UCM CL/Pro licenses). The Expressway management APIs (REST, SNMP, XML)
  are unlocked by the underlying product license rather than sold as a metered API; per-call pricing is
  not publicly published.
notes: No public per-API price list. Cisco Expressway capacity (registrations, calls, MRA users) is
  governed by Smart Licensing entitlements bundled with collaboration products. Replace with negotiated
  list pricing once available from a Cisco partner quote.
sources:
  - https://www.cisco.com/c/en/us/products/unified-communications/expressway-series/index.html
  - https://www.cisco.com/c/en/us/products/collaboration-endpoints/collaboration-flex-plan/index.html
plans:
  - id: cisco-expressway-included-with-collaboration
    name: Included with Cisco Collaboration Licensing
    type: enterprise
    description: Expressway is delivered as part of Cisco's collaboration entitlements (Webex Suite,
      Collaboration Flex Plan, UCM CL Enhanced/Pro). Capacity and feature scope follow the parent
      license; the management APIs are not separately metered.
    entries:
      - label: Bundled licensing
        name: bundled_license
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see Cisco partner quote
        userMultiplied: false
    elements:
      - name: REST Provisioning API
      - name: REST Status API
      - name: SNMP MIB access
      - name: Legacy XML configuration API
      - name: MRA / B2B traversal capacity per parent license
