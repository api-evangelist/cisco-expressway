naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Status API — Resource Usage
  description: 'Cisco Expressway Status API — Resource Usage. 2 operations. Lead operation: Cisco Expressway Retrieve system
    resource usage. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Resource Usage
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-resource-usage
    baseUri: https://{host}/api
    description: Cisco Expressway Status API — Resource Usage business capability. Self-contained, no shared references.
    resources:
    - name: status-common-resourceusage
      path: /status/common/resourceusage
      operations:
      - name: getresourceusage
        method: GET
        description: Cisco Expressway Retrieve system resource usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: status-common-turnrelays
      path: /status/common/turnrelays
      operations:
      - name: listturnrelays
        method: GET
        description: Cisco Expressway List active TURN relay allocations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: status-resource-usage-rest
    port: 8080
    description: REST adapter for Cisco Expressway Status API — Resource Usage. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/status/common/resourceusage
      name: status-common-resourceusage
      description: REST surface for status-common-resourceusage.
      operations:
      - method: GET
        name: getresourceusage
        description: Cisco Expressway Retrieve system resource usage
        call: status-resource-usage.getresourceusage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/status/common/turnrelays
      name: status-common-turnrelays
      description: REST surface for status-common-turnrelays.
      operations:
      - method: GET
        name: listturnrelays
        description: Cisco Expressway List active TURN relay allocations
        call: status-resource-usage.listturnrelays
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-resource-usage-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Status API — Resource Usage. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-expressway-retrieve-system-resource
      description: Cisco Expressway Retrieve system resource usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-resource-usage.getresourceusage
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-expressway-list-active-turn
      description: Cisco Expressway List active TURN relay allocations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-resource-usage.listturnrelays
      outputParameters:
      - type: object
        mapping: $.
