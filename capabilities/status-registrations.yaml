naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Status API — Registrations
  description: 'Cisco Expressway Status API — Registrations. 1 operations. Lead operation: Cisco Expressway List all current
    registrations. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Registrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-registrations
    baseUri: https://{host}/api
    description: Cisco Expressway Status API — Registrations business capability. Self-contained, no shared references.
    resources:
    - name: status-common-registrations
      path: /status/common/registrations
      operations:
      - name: listregistrations
        method: GET
        description: Cisco Expressway List all current registrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: status-registrations-rest
    port: 8080
    description: REST adapter for Cisco Expressway Status API — Registrations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/status/common/registrations
      name: status-common-registrations
      description: REST surface for status-common-registrations.
      operations:
      - method: GET
        name: listregistrations
        description: Cisco Expressway List all current registrations
        call: status-registrations.listregistrations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-registrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Status API — Registrations. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-expressway-list-all-current
      description: Cisco Expressway List all current registrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-registrations.listregistrations
      outputParameters:
      - type: object
        mapping: $.
