naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Status API — Zones
  description: 'Cisco Expressway Status API — Zones. 1 operations. Lead operation: Cisco Expressway List zone connectivity
    status. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Zones
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-zones
    baseUri: https://{host}/api
    description: Cisco Expressway Status API — Zones business capability. Self-contained, no shared references.
    resources:
    - name: status-common-zones
      path: /status/common/zones
      operations:
      - name: listzonestatus
        method: GET
        description: Cisco Expressway List zone connectivity status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: status-zones-rest
    port: 8080
    description: REST adapter for Cisco Expressway Status API — Zones. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/status/common/zones
      name: status-common-zones
      description: REST surface for status-common-zones.
      operations:
      - method: GET
        name: listzonestatus
        description: Cisco Expressway List zone connectivity status
        call: status-zones.listzonestatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-zones-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Status API — Zones. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cisco-expressway-list-zone-connectivity
      description: Cisco Expressway List zone connectivity status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-zones.listzonestatus
      outputParameters:
      - type: object
        mapping: $.
