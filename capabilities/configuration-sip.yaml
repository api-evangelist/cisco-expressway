naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Configuration API — SIP
  description: 'Cisco Expressway Configuration API — SIP. 2 operations. Lead operation: Cisco Expressway Retrieve SIP configuration.
    Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - SIP
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-sip
    baseUri: https://{host}/api
    description: Cisco Expressway Configuration API — SIP business capability. Self-contained, no shared references.
    resources:
    - name: provisioning-common-sip-configuration
      path: /provisioning/common/sip/configuration
      operations:
      - name: getsipconfiguration
        method: GET
        description: Cisco Expressway Retrieve SIP configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesipconfiguration
        method: PUT
        description: Cisco Expressway Update SIP configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: configuration-sip-rest
    port: 8080
    description: REST adapter for Cisco Expressway Configuration API — SIP. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/provisioning/common/sip/configuration
      name: provisioning-common-sip-configuration
      description: REST surface for provisioning-common-sip-configuration.
      operations:
      - method: GET
        name: getsipconfiguration
        description: Cisco Expressway Retrieve SIP configuration
        call: configuration-sip.getsipconfiguration
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesipconfiguration
        description: Cisco Expressway Update SIP configuration
        call: configuration-sip.updatesipconfiguration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-sip-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Configuration API — SIP. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-expressway-retrieve-sip-configuration
      description: Cisco Expressway Retrieve SIP configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-sip.getsipconfiguration
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-expressway-update-sip-configuration
      description: Cisco Expressway Update SIP configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: configuration-sip.updatesipconfiguration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
