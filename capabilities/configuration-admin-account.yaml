naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Configuration API — Admin Account
  description: 'Cisco Expressway Configuration API — Admin Account. 1 operations. Lead operation: Cisco Expressway Change
    administrator password. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Admin Account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-admin-account
    baseUri: https://{host}/api
    description: Cisco Expressway Configuration API — Admin Account business capability. Self-contained, no shared references.
    resources:
    - name: v1-provisioning-common-adminaccount-changepassword
      path: /v1/provisioning/common/adminaccount/changepassword
      operations:
      - name: changeadminpassword
        method: POST
        description: Cisco Expressway Change administrator password
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: configuration-admin-account-rest
    port: 8080
    description: REST adapter for Cisco Expressway Configuration API — Admin Account. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/provisioning/common/adminaccount/changepassword
      name: v1-provisioning-common-adminaccount-changepassword
      description: REST surface for v1-provisioning-common-adminaccount-changepassword.
      operations:
      - method: POST
        name: changeadminpassword
        description: Cisco Expressway Change administrator password
        call: configuration-admin-account.changeadminpassword
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-admin-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Configuration API — Admin Account. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: cisco-expressway-change-administrator-password
      description: Cisco Expressway Change administrator password
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: configuration-admin-account.changeadminpassword
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
