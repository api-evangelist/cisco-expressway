naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Status API — Licensing
  description: 'Cisco Expressway Status API — Licensing. 1 operations. Lead operation: Cisco Expressway Retrieve smart licensing
    status. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Licensing
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-licensing
    baseUri: https://{host}/api
    description: Cisco Expressway Status API — Licensing business capability. Self-contained, no shared references.
    resources:
    - name: v1-status-common-smartlicensing-licensing
      path: /v1/status/common/smartlicensing/licensing
      operations:
      - name: getsmartlicensingstatus
        method: GET
        description: Cisco Expressway Retrieve smart licensing status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: status-licensing-rest
    port: 8080
    description: REST adapter for Cisco Expressway Status API — Licensing. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/status/common/smartlicensing/licensing
      name: v1-status-common-smartlicensing-licensing
      description: REST surface for v1-status-common-smartlicensing-licensing.
      operations:
      - method: GET
        name: getsmartlicensingstatus
        description: Cisco Expressway Retrieve smart licensing status
        call: status-licensing.getsmartlicensingstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-licensing-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Status API — Licensing. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: cisco-expressway-retrieve-smart-licensing
      description: Cisco Expressway Retrieve smart licensing status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-licensing.getsmartlicensingstatus
      outputParameters:
      - type: object
        mapping: $.
