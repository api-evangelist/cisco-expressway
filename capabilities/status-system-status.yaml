naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Status API — System Status
  description: 'Cisco Expressway Status API — System Status. 1 operations. Lead operation: Cisco Expressway Retrieve system
    status overview. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - System Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-system-status
    baseUri: https://{host}/api
    description: Cisco Expressway Status API — System Status business capability. Self-contained, no shared references.
    resources:
    - name: status-common-systeminfo
      path: /status/common/systeminfo
      operations:
      - name: getsystemstatus
        method: GET
        description: Cisco Expressway Retrieve system status overview
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: status-system-status-rest
    port: 8080
    description: REST adapter for Cisco Expressway Status API — System Status. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/status/common/systeminfo
      name: status-common-systeminfo
      description: REST surface for status-common-systeminfo.
      operations:
      - method: GET
        name: getsystemstatus
        description: Cisco Expressway Retrieve system status overview
        call: status-system-status.getsystemstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-system-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Status API — System Status. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-expressway-retrieve-system-status
      description: Cisco Expressway Retrieve system status overview
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-system-status.getsystemstatus
      outputParameters:
      - type: object
        mapping: $.
