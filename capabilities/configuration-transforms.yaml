naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Configuration API — Transforms
  description: 'Cisco Expressway Configuration API — Transforms. 4 operations. Lead operation: Cisco Expressway List all pre-search
    transforms. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Transforms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-transforms
    baseUri: https://{host}/api
    description: Cisco Expressway Configuration API — Transforms business capability. Self-contained, no shared references.
    resources:
    - name: provisioning-common-transform
      path: /provisioning/common/transform
      operations:
      - name: listtransforms
        method: GET
        description: Cisco Expressway List all pre-search transforms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtransform
        method: POST
        description: Cisco Expressway Create a pre-search transform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updatetransform
        method: PUT
        description: Cisco Expressway Update a pre-search transform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetransform
        method: DELETE
        description: Cisco Expressway Delete a pre-search transform
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: configuration-transforms-rest
    port: 8080
    description: REST adapter for Cisco Expressway Configuration API — Transforms. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/provisioning/common/transform
      name: provisioning-common-transform
      description: REST surface for provisioning-common-transform.
      operations:
      - method: GET
        name: listtransforms
        description: Cisco Expressway List all pre-search transforms
        call: configuration-transforms.listtransforms
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtransform
        description: Cisco Expressway Create a pre-search transform
        call: configuration-transforms.createtransform
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatetransform
        description: Cisco Expressway Update a pre-search transform
        call: configuration-transforms.updatetransform
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetransform
        description: Cisco Expressway Delete a pre-search transform
        call: configuration-transforms.deletetransform
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-transforms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Configuration API — Transforms. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: cisco-expressway-list-all-pre
      description: Cisco Expressway List all pre-search transforms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: configuration-transforms.listtransforms
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-expressway-create-pre-search
      description: Cisco Expressway Create a pre-search transform
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: configuration-transforms.createtransform
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-expressway-update-pre-search
      description: Cisco Expressway Update a pre-search transform
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: configuration-transforms.updatetransform
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cisco-expressway-delete-pre-search
      description: Cisco Expressway Delete a pre-search transform
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: configuration-transforms.deletetransform
      outputParameters:
      - type: object
        mapping: $.
