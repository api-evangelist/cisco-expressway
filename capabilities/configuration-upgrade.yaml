naftiko: 1.0.0-alpha2
info:
  label: Cisco Expressway Configuration API — Upgrade
  description: 'Cisco Expressway Configuration API — Upgrade. 1 operations. Lead operation: Cisco Expressway Trigger a system
    upgrade. Self-contained Naftiko capability covering one Cisco Expressway business surface.'
  tags:
  - Cisco Expressway
  - Upgrade
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CISCO_EXPRESSWAY_API_KEY: CISCO_EXPRESSWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: configuration-upgrade
    baseUri: https://{host}/api
    description: Cisco Expressway Configuration API — Upgrade business capability. Self-contained, no shared references.
    resources:
    - name: v1-provisioning-common-upgrade
      path: /v1/provisioning/common/upgrade
      operations:
      - name: triggerupgrade
        method: POST
        description: Cisco Expressway Trigger a system upgrade
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CISCO_EXPRESSWAY_USER}}'
      password: '{{env.CISCO_EXPRESSWAY_PASS}}'
  exposes:
  - type: rest
    namespace: configuration-upgrade-rest
    port: 8080
    description: REST adapter for Cisco Expressway Configuration API — Upgrade. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/provisioning/common/upgrade
      name: v1-provisioning-common-upgrade
      description: REST surface for v1-provisioning-common-upgrade.
      operations:
      - method: POST
        name: triggerupgrade
        description: Cisco Expressway Trigger a system upgrade
        call: configuration-upgrade.triggerupgrade
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: configuration-upgrade-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cisco Expressway Configuration API — Upgrade. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: cisco-expressway-trigger-system-upgrade
      description: Cisco Expressway Trigger a system upgrade
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: configuration-upgrade.triggerupgrade
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
