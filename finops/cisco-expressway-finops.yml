specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Cisco Expressway
providerId: cisco-expressway
publisherName: Cisco Systems, Inc.
serviceCategory: Unified Communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Collaboration
  - Unified Communications
  - Video Conferencing
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Cisco Expressway. Cost is driven by Cisco Smart Licensing
  entitlements (Webex Suite / Collaboration Flex Plan / UCM CL) plus underlying compute for the VM
  appliance — not by per-API metering.
notes: Per-API meters below are modeled placeholders; real billing flows through Cisco's collaboration
  licensing line items, not metered API consumption.
sources:
  - https://www.cisco.com/c/en/us/products/unified-communications/expressway-series/index.html
  - https://www.cisco.com/c/en/us/products/collaboration-endpoints/collaboration-flex-plan/index.html
billingModel:
  pricingCategory: Subscription + Perpetual License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Cisco Expressway
  ServiceCategory: Unified Communications
  ProviderName: Cisco
  PublisherName: Cisco Systems, Inc.
  InvoiceIssuerName: Cisco Systems, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: collaboration_license
    description: Cisco Smart Licensing entitlements that authorize Expressway capacity (registrations,
      MRA users, B2B traversal).
    unit: license
    aggregation: sum
    dimensions:
      - sku
      - tier
      - region
  - name: traversal_calls
    description: Concurrent traversal calls (rich-media sessions) supported by the appliance.
    unit: concurrent_session
    aggregation: max
    dimensions:
      - appliance_size
      - region
  - name: mra_users
    description: Registered Mobile and Remote Access users.
    unit: user
    aggregation: max
    dimensions:
      - region
principles:
  - name: Visibility
    description: Use Cisco Smart Software Manager (CSSM) to observe license consumption; pair with
      Expressway's built-in usage and call detail reports.
  - name: Allocation
    description: Allocate Expressway license cost to the collaboration cost center; tag VM hosting
      cost by datacenter/region and apply showback to UC service owners.
  - name: Optimization
    description: Right-size Expressway VM appliances (Small/Medium/Large), consolidate traversal
      capacity across regions, and align Smart License count with peak concurrent usage.
  - name: Accountability
    description: Collaboration platform owner is accountable for Expressway license forecasting,
      renewal cadence, and capacity planning against Cisco's True Forward licensing model.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
